<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <title>12365</title>
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        var base = '/12365/'
        var loc = window.location
        if (loc.pathname.indexOf(base) === 0) {
          var path = loc.pathname.slice(base.length)
          var search = loc.search ? '&' + loc.search.slice(1).replace(/&/g, '~and~') : ''
          loc.replace(loc.protocol + '//' + loc.host + base + '?/' + path + search + loc.hash)
        } else {
          loc.replace(loc.protocol + '//' + loc.host + base)
        }
      })()
    </script>
  </head>
  <body></body>
</html>
